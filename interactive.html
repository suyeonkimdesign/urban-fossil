<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Urban Fossil — Vertical LED Installation</title>

  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>

  <style>
    /* 1) Font Integration */
    @font-face {
      font-family: 'GT-Zirkon';
      src: url('assets/GT-Zirkon-Bold.otf') format('opentype');
      font-weight: bold;
      font-style: normal;
    }

    html, body {
      margin: 0; 
      padding: 0; 
      overflow: hidden;
      background: #000; 
      color: #fff;
      font-family: 'GT-Zirkon', system-ui, sans-serif;
      /* Ensure everything sticks to the far left of the browser */
      display: flex;
      justify-content: flex-start;
      align-items: flex-start;
    }

    /* 2) Left-aligned Canvas */
    canvas { 
      display: block; 
      margin: 0; 
    }
    
    #loading {
      position: fixed; inset: 0; display: flex; align-items: center;
      justify-content: center; font-size: 18px; z-index: 20;
      background: #000; letter-spacing: 2px; text-transform: uppercase;
    }

    /* 3) Left-aligned text containers, centered within the 512px column */
    .stats {
      position: fixed; 
      left: 0;
      width: 512px; 
      z-index: 10;
      pointer-events: none;
      text-transform: uppercase;
      line-height: 0.85;
      text-align: center; 
      text-shadow: none; /* Shadow removed for clinical look */
    }

    #trash-display { 
      top: 40px; 
      font-size: 64px; 
    }

    #timer-display { 
      bottom: 40px; 
      font-size: 72px; 
    }

    .unit-subtext {
      font-size: 24px;
      display: block;
      margin-top: 5px;
      opacity: 0.9;
    }
  </style>
</head>
<body>
  <div id="loading">Initializing Urban Fossil...</div>
  
  <div id="trash-display" class="stats">0.000g<span class="unit-subtext">0.000 lbs</span></div>
  <div id="timer-display" class="stats">00:00:00</div>

  <script>
    let capture;
    let handsDetector;
    let detections = [];

    // --- ASSETS ---
    const IMAGE_ROOT = "assets/letters";  
    const MANIFEST_PATH = "assets/manifest.json";
    let glyphImages = [];
    let glyphs = [];

    // --- TRACKING & DATA ---
    let handTimers = {}; // Independent timers for multi-hand generation
    let totalSeconds = parseFloat(localStorage.getItem('urbanFossilSeconds')) || 0;
    let lastUpdateTime = 0;

    class Glyph {
      constructor(x, y, img, size) {
        this.x = x; this.y = y; this.img = img; this.size = size;
        this.alpha = 255;
        this.birthTime = millis();
        this.rotation = random(TWO_PI);
      }
      update() {
        let age = millis() - this.birthTime;
        if (age > 2000) this.alpha -= 5; 
      }
      draw() {
        if (this.alpha <= 0) return;
        push();
        translate(this.x, this.y);
        rotate(this.rotation);
        imageMode(CENTER);
        tint(255, this.alpha);
        image(this.img, 0, 0, this.size, this.size);
        pop();
      }
    }

    function setup() {
      createCanvas(512, 768);
      
      loadJSON(MANIFEST_PATH, (data) => {
        for (const [letter, files] of Object.entries(data)) {
          files.forEach(f => glyphImages.push(loadImage(`${IMAGE_ROOT}/${letter}/${f}`)));
        }
      });

      capture = createCapture(VIDEO);
      capture.size(1280, 720); 
      capture.hide();

      handsDetector = new Hands({
        locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
      });

      handsDetector.setOptions({
        maxNumHands: 4, // Up to 4 hands at once
        modelComplexity: 1,
        minDetectionConfidence: 0.5,
        minTrackingConfidence: 0.5,
        selfieMode: true 
      });

      handsDetector.onResults((results) => { detections = results.multiHandLandmarks; });

      const camera = new Camera(capture.elt, {
        onFrame: async () => { await handsDetector.send({image: capture.elt}); },
        width: 1280, height: 720
      });
      
      camera.start().then(() => {
        document.getElementById('loading').style.display = 'none';
      });
    }

    function draw() {
      background(0);

      // 1) Mirror & Cover Logic
      if (capture.loadedmetadata) {
        push();
        translate(width, 0); scale(-1, 1);
        let videoAspect = capture.width / capture.height;
        let canvasAspect = width / height;
        let imgW, imgH;
        if (canvasAspect < videoAspect) {
          imgH = height; imgW = height * videoAspect;
        } else {
          imgW = width; imgH = width / videoAspect;
        }
        image(capture, (width - imgW) / 2, (height - imgH) / 2, imgW, imgH);
        pop();
      }

      // 2) Darker Tint (Increased to 70)
      fill(0, 120); 
      rect(0, 0, width, height);

      handleStats();

      // 3) Multi-Hand Independent Spraying
      if (detections && detections.length > 0) {
        detections.forEach((landmarks, index) => {
          let handID = "hand_" + index;
          if (!handTimers[handID]) handTimers[handID] = 0;

          let indexTip = landmarks[8];
          let wrist = landmarks[0];
          let pinkyBase = landmarks[17];

          // Edge mapping allows letters to sit partially off-canvas
          let x = map(indexTip.x, 0, 1, 0, width); 
          let y = map(indexTip.y, 0, 1, 0, height);

          let handDist = dist(wrist.x, wrist.y, pinkyBase.x, pinkyBase.y);
          let spraySize = map(handDist, 0.05, 0.25, 150, 650);

          if (millis() - handTimers[handID] > 500 && glyphImages.length > 0) {
            glyphs.push(new Glyph(x, y, random(glyphImages), spraySize));
            handTimers[handID] = millis();
          }
        });
      }

      for (let i = glyphs.length - 1; i >= 0; i--) {
        glyphs[i].update();
        glyphs[i].draw();
        if (glyphs[i].alpha <= 0) glyphs.splice(i, 1);
      }
    }

    function handleStats() {
      if (detections && detections.length > 0) {
        let now = millis();
        if (lastUpdateTime > 0) {
          totalSeconds += (now - lastUpdateTime) / 1000;
          localStorage.setItem('urbanFossilSeconds', totalSeconds);
        }
        lastUpdateTime = now;
      } else {
        lastUpdateTime = 0;
      }

      let h = Math.floor(totalSeconds / 3600);
      let m = Math.floor((totalSeconds % 3600) / 60);
      let s = Math.floor(totalSeconds % 60);
      document.getElementById('timer-display').innerText = `${nf(h,2)}:${nf(m,2)}:${nf(s,2)}`;

      let grams = totalSeconds * 0.026;
      let lbs = grams * 0.00220462;
      document.getElementById('trash-display').innerHTML = 
        `${grams.toFixed(3)}g<span class="unit-subtext">${lbs.toFixed(3)} lbs</span>`;
    }

    function keyPressed() { if (key === 'c' || key === 'C') glyphs = []; }
  </script>
</body>
</html>
